name: Generate ATT&CK coverage layer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Generate coverage layer
        run: |
          mkdir -p output
          python -m coverage_map generate rules/ --output output/coverage.json --summary || true

      - name: Upload coverage layer
        uses: actions/upload-artifact@v4
        with:
          name: attack-navigator-layer
          path: output/coverage.json
